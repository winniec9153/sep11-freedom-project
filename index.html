<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 { color: darkblue; }
        h2 { color: green; }

        button {
            background-color: darkblue;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        button:hover { background-color: navy; }

        input, select { margin: 5px; padding: 5px; }

        /* Make the p5 canvas sit behind everything */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Keep all app content above the canvas */
        #app {
            position: relative;
            z-index: 1;
        }
    </style>

    <title>Budget App</title>
</head>
<body>

    <!-- App content sits above the canvas -->
    <div id="app">
        <h1>Budget App</h1>

        <h2>Balance: $<span id="balance">0</span></h2>

        <h3>Start Game</h3>
        <input type="number" id="startingMoney" placeholder="Enter starting money">
        <button id="startButton">Start</button>

        <hr>

        <h3>Add Transaction</h3>
        <input type="number" id="amountInput" placeholder="Enter amount">

        <select id="typeInput">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <select id="categoryInput">
            <option value="Food">Food</option>
            <option value="Gas">Gas</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Job">Job</option>
            <option value="Other">Other</option>
        </select>

        <button id="addButton">Add</button>

        <h3>Category Totals</h3>
        <ul id="categoryTotals"></ul>

        <h3>Daily Log</h3>
        <ul id="dailyLog"></ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

    <script>
        // JS

        var balance = 0; //creates the balance variable, where player stores their money

        var categories = {
            Food: 0,
            Gas: 0,
            Entertainment: 0,
            Job: 0,
            Other: 0
        };

        // a new function for categories
        function updateCategories() { //updates the list on your screen so every time you add a transaction, this function refreshes the category totals display
            var list = document.querySelector("#categoryTotals");
            list.innerHTML = ""; //This clears the list first so it doesn't stack duplicates

            for (var cat in categories) { //Go through every key (Food, Gas, Entertainment, Other) inside the categories object one by one.
                var li = document.createElement("li"); //Creates a new list item
                li.innerHTML = cat + ": $" + categories[cat];
                //Food: $50, cat = "Food" categories[cat] = 50
                list.appendChild(li);
            }
        }

        // the daily log function
        function addToLog(amount, type, category) {
            //creating a function that will take in 3 pieces of data:
            //amount = how much money, type = income or expense, category = Food, Gas, etc

            var li = document.createElement("li");
            li.innerHTML = type + " - $" + amount + " (" + category + ")";
            //Example: expense - $50 (Food)

            document.querySelector("#dailyLog").appendChild(li);
        }

        // start button
        document.querySelector("#startButton").addEventListener("click", function () { // When the start button is clicked, it will run the code

            var startValue = document.querySelector("#startingMoney").value; //if the player type 500, startValue =500

            balance = Number(startValue); //convert it into a number

            localStorage.setItem("balance", balance); //save balance so it doesn't disappear on refresh

            document.querySelector("#balance").innerHTML = balance; //display balance
        });

        document.querySelector("#addButton").addEventListener("click", function () {

            var amount = Number(document.querySelector("#amountInput").value);
            var type = document.querySelector("#typeInput").value;
            var category = document.querySelector("#categoryInput").value;

            if (type == "expense") {
                balance -= amount;   // subtract amounts
                categories[category] += amount; //track spending
            } else {
                balance += amount;   // add amounts
            }

            localStorage.setItem("balance", balance);
            document.querySelector("#balance").innerHTML = balance;

            updateCategories();
            addToLog(amount, type, category); //calling function with values

            // ALERT if balance is low
            if (balance < 25) {
                alert("WARNING: YOUR BALANCE IS BELOW $25!");
            }
        });

        //USING p5.js/p5play – Floating $ Signs in the Background

        new p5(function (p) {
            var signs = [];
            var SIGNS = 20; // how many $ signs float around in the background

            p.setup = function () {
                p.createCanvas(window.innerWidth, window.innerHeight);
                p.textFont('Arial');

                for (var i = 0; i < SIGNS; i++) {
                    signs.push(createSign(p));
                }
            };

            p.draw = function () {
                p.clear(); // transparent background so lightblue body shows through

                for (var i = 0; i < signs.length; i++) {
                    var s = signs[i];

                    // move upward with a gentle side wobble
                    s.wobble += s.wobbleSpeed;
                    s.x += s.speedX + Math.sin(s.wobble) * 0.5;
                    s.y += s.speedY;

                    // reset to bottom when it floats off the top
                    if (s.y < -60) {
                        signs[i] = createSign(p);
                        signs[i].y = p.height + 20; // start from bottom
                    }

                    p.noStroke();
                    p.fill(0, 100, 0, s.alpha); // dark green, semi-transparent because of s.alpha
                    p.textSize(s.size);
                    p.textAlign(p.CENTER, p.CENTER);
                    p.text('$', s.x, s.y);// draws the $ character on the canvas at the sign's current x and y position. This is the line that makes it actually appear.
                }
            };

            p.windowResized = function () {
                p.resizeCanvas(window.innerWidth, window.innerHeight);
            };


            function createSign(p) {
                return {
                    x: p.random(p.width),
                    y: p.random(p.height),
                    size: p.random(16, 50),
                    speedX: p.random(-0.5, 0.5),
                    speedY: p.random(-1.0, -0.3),
                    alpha: p.random(40, 120),
                    wobble: p.random(0, p.TWO_PI),
                    wobbleSpeed: p.random(0.01, 0.04)
                };
            }
        });
    </script>
</body>
</html>
