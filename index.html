<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 { color: darkblue; }
        h2 { color: green; }

        button {
            background-color: darkblue;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }

        button:hover { background-color: navy; }

        input, select { margin: 5px; padding: 5px; }

        /* Make the p5 canvas sit behind everything */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Keep all app content above the canvas */
        #app {
            position: relative;
            z-index: 1;
        }

        /* Hide the p5play thing that appears*/
        body > div[style*="z-index: 1000"],
        body > div[style*="z-index: 1001"] {
            display: none !important;
        }
    </style>

    <title>Budget App</title>
</head>
<body>

    <!-- App content sits above the canvas -->
    <div id="app">
        <h1>Budget App</h1>

        <h2>Balance: $<span id="balance">0</span></h2>

        <h3>Start Game</h3>
        <input type="number" id="startingMoney" placeholder="Enter starting money">
        <button id="startButton">Start</button>

        <hr>

        <h3>Add Transaction</h3>
        <input type="number" id="amountInput" placeholder="Enter amount">

        <select id="typeInput">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <select id="categoryInput">
            <option value="Food">Food</option>
            <option value="Gas">Gas</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Job">Job</option>
            <option value="Other">Other</option>
        </select>

        <button id="addButton">Add</button>

        <h3>Expenses Breakdown</h3>
        <ul id="categoryTotals"></ul>

        <h3>Daily Log</h3>
        <ul id="dailyLog"></ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://p5play.org/v3/planck.js"></script>
    <script src="https://p5play.org/v3/p5.play.js"></script>

    <script>
        var appBalance = 0; //creates the balance variable, where player stores their money

        var appCategories = {
            Food: 0,
            Gas: 0,
            Entertainment: 0,
            Other: 0
        };

        // a new function for categories
        function updateCategories() { //updates the list on your screen so every time you add a transaction, this function refreshes the category totals display
            var list = document.querySelector("#categoryTotals");
            list.innerHTML = ""; //This clears the list first so it doesn't stack duplicates

            for (var cat in appCategories) { //Go through every key (Food, Gas, Entertainment, Other) inside the categories object one by one.
                var li = document.createElement("li"); //Creates a new list item
                li.innerHTML = cat + ": $" + appCategories[cat];
                //Food: $50, cat = "Food" appCategories[cat] = 50
                list.appendChild(li);
            }
        }

        // the daily log function
        function addToLog(amount, type, category) {
            //creating a function that will take in 3 pieces of data:
            //amount = how much money, type = income or expense, category = Food, Gas, etc

            var li = document.createElement("li");
            li.innerHTML = type + " - $" + amount + " (" + category + ")";
            //Example: expense - $50 (Food)

            document.querySelector("#dailyLog").appendChild(li);
        }

        // start button
        document.querySelector("#startButton").addEventListener("click", function () { // When the start button is clicked, it will run the code

            var startValue = document.querySelector("#startingMoney").value; //if the player type 500, startValue = 500

            appBalance = Number(startValue); //convert it into a number

            localStorage.setItem("appBalance", appBalance); //save balance so it doesn't disappear on refresh

            document.querySelector("#balance").innerHTML = appBalance; //display balance
        });

        document.querySelector("#addButton").addEventListener("click", function () {

            var amount = Number(document.querySelector("#amountInput").value);//Get the number the user typed into the amount box and save it as amount
            var type = document.querySelector("#typeInput").value;//Get whether the user selected ‘income’ or ‘expense’ and save it as type
            var category = document.querySelector("#categoryInput").value;//Get the category the user picked and save it as category

            if (type == "expense") {
                appBalance -= amount;   // subtract amounts
                appCategories[category] += amount; //track spending
            } else {
                appBalance += amount;   // add amounts
            }

            localStorage.setItem("appBalance", appBalance);
            document.querySelector("#balance").innerHTML = appBalance;

            updateCategories();
            addToLog(amount, type, category); //calling function with values

            // ALERT if balance is low
            if (appBalance < 25) {
                alert("WARNING: YOUR BALANCE IS BELOW $25!");
            }
        });
    </script>

    <script>
        //P5play to display Floating $ Signs in the Background
        // I used a separate script tag b/c p5play only works in global mode

        let signs = [];

        function setup() {
            new Canvas(windowWidth, windowHeight);

            for (let i = 0; i < 20; i++) {
                let s = new Sprite();
                s.x = random(width);
                s.y = random(height);
                s.image = '💵'; // emoji image for the $ sign
                s.scale = random(0.5, 1.5);
                s.vel.y = random(-1, -0.3);
                s.vel.x = random(-0.5, 0.5);
                s.collider = 'none'; // no physics collisions needed
                signs.push(s);
            }
        }

        function draw() {
            clear(); // wipe canvas each frame so sprites don't leave trails

            // Reset $ signs that float off the top of the screen
            for (let s of signs) {
                if (s.y < -50) {
                    s.y = height + 20;
                    s.x = random(width);
                }
            }
            // p5play automatically draws all sprites AFTER draw() finishes
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

</body>
</html>
