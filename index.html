<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="style.css" rel="stylesheet" type="text/css" />

        <style>
            /* CSS */

            body {
                background-color: lightblue;
                font-family: Arial, sans-serif;
                text-align: center;
            }

            h1 {
                color: darkblue;
            }

            h2 {
                color: green;
            }

            button {
                background-color: darkblue;
                color: white;
                padding: 5px 10px;
                border: none;
                cursor: pointer;
                margin: 5px;
            }

            button:hover {
                background-color: navy;
            }

            input, select {
                margin: 5px;
                padding: 5px;
            }

        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->
         <!--title of game-->
         <h1> Budget App  </h1>

         <!-- the current balance -->
         <h2>Balance: $<span id="balance">0</span></h2>

         <!-- the starting amount -->
         <h3> Start Game</h3>
         <input type="number" id="startingMoney" placeholder="Enter starting money">
         <button id="startButton"> Start</button>

         <hr>

         <!--Add transaction-->
         <h3> Add Transaction</h3>

         <input type="number" id= "amountInput" placeholder="Enter amount">

         <select id="typeInput">
            <option value="income">Income</option>
            <option value= "expense"> Expense</option>
         </select>

         <!-- the category dropdown of the choices -->
         <select id="categoryInput">
            <option value="Food">Food</option>
            <option value="Gas">Gas</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Job">Job</option>
            <option value="Other">Other</option>
        </select>

         <button id="addButton"> Add </button>

         <!-- This is the CATEGORY DISPLAY -->
        <h3>Category Totals</h3>
        <ul id="categoryTotals"></ul>

         <!-- the DAILY LOG -->
        <h3>Daily Log</h3>
        <ul id="dailyLog"></ul>



        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.10.2/p5.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/0.10.2/addons/p5.sound.min.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/molleindustria/p5.play/lib/p5.play.js"></script>

        <script>
            // JS

            var balance = 0; //creates the balance variable, where player stores their money

            var categories = {
                Food: 0,
                Gas: 0,
                Entertainment: 0,
                Job: 0,
                Other: 0
            };

            // a new function for categories
            function updateCategories(){ //updates the list on your screen so every time you add a transaction, this function refreshes the category totals display

                var list = document.querySelector("#categoryTotals");
                list.innerHTML = ""; //This clears the list first so it doesn’t stack duplicates

                for(var cat in categories){ //Go through every key (Food, Gas, Entertainment, Other) inside the categories object one by one.
                    var li = document.createElement("li"); //Creates a new list item
                    li.innerHTML = cat + ": $" + categories[cat];
                    //Food: $50, cat = "Food" categories[cat] = 50
                    list.appendChild(li);
                }
            }

            // the daily log function
            function addToLog(amount, type, category){
                //creating a function that will take in 3 pieces of data:
                //amount = how much money, type = income or expense, category = Food, Gas, etc

                var li = document.createElement("li");
                li.innerHTML = type + " - $" + amount + " (" + category + ")";
                //Example: expense - $50 (Food)

                document.querySelector("#dailyLog").appendChild(li);
            }



            // start button
            document.querySelector("#startButton").addEventListener("click", function(){
                // When the start button is clicked, it will run the code

                var startValue= document.querySelector("#startingMoney").value;
                //if the player type 500, startValue =500

                balance= Number(startValue);
                //convert it into a number

                localStorage.setItem("balance", balance);
                //save balance so it doesn't disappear on refresh

                document.querySelector("#balance").innerHTML=balance;
                //display balance
            })


            document.querySelector("#addButton").addEventListener("click", function(){

                var amount = Number(document.querySelector("#amountInput").value);
                var type = document.querySelector("#typeInput").value;
                var category = document.querySelector("#categoryInput").value;

                if(type == "expense"){
                    balance -= amount;   // subtract amounts
                    categories[category] += amount; //track spending
                } else {
                    balance += amount;   // add amounts
                }

                localStorage.setItem("balance", balance);
                document.querySelector("#balance").innerHTML = balance;

                updateCategories();
                addToLog(amount, type, category);
                //calling function with values

                // ALERT if balance is low
                if (balance < 25) {
                    alert("WARNING: YOUR BALANCE IS BELOW $25!");
                }

            });

        </script>
    </body>
</html>
